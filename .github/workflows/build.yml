name: Build OpenWrt Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.sdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: x86_64-25.12.4
          - sdk: x86_64-24.10.6

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          path: luci-app-nft-limiter

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" luci-app-nft-limiter/Makefile

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk }}
          FEEDNAME: nft-limiter
          PACKAGES: luci-app-nft-limiter
          BUILD_LOG: 1
          NO_REFRESH_CHECK: 1

      - name: Collect built packages
        run: |
          mkdir -p output
          find bin/ \( -name "luci-app-nft-limiter*.apk" -o -name "luci-app-nft-limiter*.ipk" \) \
            -exec cp {} output/ \;

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: luci-app-nft-limiter-${{ matrix.sdk }}
          path: output/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f \( -name "*.apk" -o -name "*.ipk" \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found under artifacts/."
            exit 1
          fi
          echo "Uploading: ${files[*]}"
          gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --latest
